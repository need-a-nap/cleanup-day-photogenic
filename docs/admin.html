<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>클린업데이 포토제닉 — 관리자</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧹</text></svg>" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <style>
    :root {
      --ink: #16394b;
      --ink-soft: #5b7a8a;
      --teal: #14b8a6;
      --teal-deep: #0d9488;
      --line: rgba(22, 57, 75, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Pretendard Variable", Pretendard, -apple-system, "Segoe UI", sans-serif;
      color: var(--ink);
      background: #f4fafa;
      padding: 28px 20px 60px;
    }
    .container { max-width: 1100px; margin: 0 auto; }
    h1 { font-size: 24px; font-weight: 800; margin: 0; letter-spacing: -0.02em; }
    h1 .sub { font-size: 14px; font-weight: 500; color: var(--ink-soft); margin-left: 10px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 22px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      border: 0; cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 700;
      padding: 10px 18px; border-radius: 10px; transition: transform 0.12s ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-green { background: linear-gradient(135deg, #16a34a, #22c55e); color: #fff; box-shadow: 0 6px 14px rgba(34, 197, 94, 0.3); }
    .btn-gray { background: #fff; color: var(--ink); border: 1px solid var(--line); }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 22px; }
    .stat { background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px; }
    .stat .label { font-size: 12.5px; color: var(--ink-soft); font-weight: 600; }
    .stat .value { font-size: 26px; font-weight: 800; color: var(--teal-deep); margin-top: 4px; }
    .table-wrap { background: #fff; border: 1px solid var(--line); border-radius: 14px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13.5px; min-width: 860px; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--line); vertical-align: middle; }
    th { background: #f0f7f7; font-size: 12px; color: var(--ink-soft); font-weight: 700; white-space: nowrap; position: sticky; top: 0; }
    tr:last-child td { border-bottom: 0; }
    td.num { color: var(--ink-soft); }
    .thumb { width: 72px; height: 72px; object-fit: cover; border-radius: 8px; background: #eef4f6; cursor: zoom-in; display: block; }
    .memo-cell { max-width: 320px; word-break: break-word; line-height: 1.45; }
    .nick { font-weight: 700; white-space: nowrap; }
    .rx { white-space: nowrap; font-size: 13px; }
    .rx b { color: var(--teal-deep); }
    .date { white-space: nowrap; color: var(--ink-soft); font-size: 12.5px; }
    .note { margin-top: 14px; font-size: 12.5px; color: var(--ink-soft); line-height: 1.6; }
    .note a { color: var(--teal-deep); }
    #status { padding: 40px; text-align: center; color: var(--ink-soft); }
    .lightbox { position: fixed; inset: 0; background: rgba(10,30,40,0.88); display: flex; align-items: center; justify-content: center; padding: 24px; cursor: zoom-out; z-index: 50; }
    .lightbox[hidden] { display: none; }
    .lightbox img { max-width: 100%; max-height: 100%; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <h1>🧹 클린업데이 포토제닉 <span class="sub">관리자 대시보드</span></h1>
      <div class="actions">
        <button class="btn btn-gray" id="refreshBtn" type="button">🔄 새로고침</button>
        <button class="btn btn-green" id="excelBtn" type="button">📥 엑셀 다운로드</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat"><div class="label">총 게시물</div><div class="value" id="statPosts">–</div></div>
      <div class="stat"><div class="label">참여 닉네임 수</div><div class="value" id="statUsers">–</div></div>
      <div class="stat"><div class="label">총 반응 수</div><div class="value" id="statReactions">–</div></div>
      <div class="stat"><div class="label">가장 인기 반응</div><div class="value" id="statTop">–</div></div>
    </div>

    <div class="table-wrap">
      <div id="status">불러오는 중…</div>
      <table id="table" hidden>
        <thead>
          <tr>
            <th>#</th><th>사진</th><th>닉네임</th><th>메모</th>
            <th>🏛️</th><th>🦖</th><th>🪄</th><th>📦</th><th>😎</th><th>🗑️</th>
            <th>합계</th><th>작성일시</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <p class="note">
      · 게시물 <b>삭제</b>는 <a href="https://supabase.com/dashboard/project/pnqzimlvfoclfmlkzthe/editor" target="_blank" rel="noopener">Supabase 대시보드 → Table Editor → posts</a>에서 해당 행을 지우면 됩니다 (사진 파일은 Storage → photos에서 삭제).<br />
      · 이 페이지는 링크를 아는 사람만 접근하며, 참여자 화면에서는 연결되지 않습니다.
    </p>
  </div>

  <div id="lightbox" class="lightbox" hidden><img id="lightboxImg" alt="" /></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="config.js"></script>
  <script>
    "use strict";
    const REACTIONS = [
      { key: "museum", emoji: "🏛️", label: "박물관으로" },
      { key: "dino",   emoji: "🦖", label: "이게 아직도?" },
      { key: "magic",  emoji: "🪄", label: "마법수준" },
      { key: "box",    emoji: "📦", label: "이사준비완" },
      { key: "shine",  emoji: "😎", label: "눈부셔요" },
      { key: "zero",   emoji: "🗑️", label: "무소유" },
    ];
    const sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
    const $ = (id) => document.getElementById(id);
    let posts = [];

    const imageUrl = (p) => sb.storage.from("photos").getPublicUrl(p).data.publicUrl;
    const fmt = (iso) => {
      const d = new Date(iso);
      const p2 = (n) => String(n).padStart(2, "0");
      return `${d.getFullYear()}-${p2(d.getMonth() + 1)}-${p2(d.getDate())} ${p2(d.getHours())}:${p2(d.getMinutes())}`;
    };
    const sumRx = (p) => REACTIONS.reduce((s, r) => s + ((p.reactions || {})[r.key] || 0), 0);

    async function load() {
      $("status").hidden = false;
      $("status").textContent = "불러오는 중…";
      $("table").hidden = true;
      const { data, error } = await sb.from("posts").select("*").order("created_at", { ascending: false }).limit(2000);
      if (error) {
        $("status").textContent = "불러오기 실패: " + error.message;
        return;
      }
      posts = data;
      renderStats();
      renderTable();
      $("status").hidden = true;
      $("table").hidden = false;
    }

    function renderStats() {
      $("statPosts").textContent = posts.length.toLocaleString();
      $("statUsers").textContent = new Set(posts.map((p) => p.nickname.trim())).size.toLocaleString();
      const totals = {};
      let grand = 0;
      for (const p of posts) for (const r of REACTIONS) {
        const c = (p.reactions || {})[r.key] || 0;
        totals[r.key] = (totals[r.key] || 0) + c;
        grand += c;
      }
      $("statReactions").textContent = grand.toLocaleString();
      const top = REACTIONS.slice().sort((a, b) => (totals[b.key] || 0) - (totals[a.key] || 0))[0];
      $("statTop").textContent = grand ? `${top.emoji} ${top.label}` : "–";
    }

    function renderTable() {
      const tb = $("tbody");
      tb.innerHTML = "";
      posts.forEach((p, i) => {
        const tr = document.createElement("tr");
        const url = imageUrl(p.image_path);
        const rx = (k) => (p.reactions || {})[k] || 0;

        const cells = [
          `<td class="num">${posts.length - i}</td>`,
          `<td><img class="thumb" src="${url}" loading="lazy" alt="" /></td>`,
          `<td class="nick"></td>`,
          `<td class="memo-cell"></td>`,
          ...REACTIONS.map((r) => `<td class="rx"><b>${rx(r.key) || ""}</b></td>`),
          `<td class="rx"><b>${sumRx(p) || ""}</b></td>`,
          `<td class="date">${fmt(p.created_at)}</td>`,
        ];
        tr.innerHTML = cells.join("");
        tr.querySelector(".nick").textContent = p.nickname;
        tr.querySelector(".memo-cell").textContent = p.memo || "—";
        tr.querySelector(".thumb").addEventListener("click", () => {
          $("lightboxImg").src = url;
          $("lightbox").hidden = false;
        });
        tb.appendChild(tr);
      });
    }

    $("excelBtn").addEventListener("click", () => {
      if (!posts.length) return alert("다운로드할 게시물이 없습니다.");
      const rows = posts.slice().reverse().map((p, i) => {
        const row = {
          "번호": i + 1,
          "닉네임": p.nickname,
          "메모": p.memo || "",
        };
        for (const r of REACTIONS) row[`${r.emoji} ${r.label}`] = (p.reactions || {})[r.key] || 0;
        row["반응 합계"] = sumRx(p);
        row["작성일시"] = fmt(p.created_at);
        row["사진 URL"] = imageUrl(p.image_path);
        return row;
      });
      const ws = XLSX.utils.json_to_sheet(rows);
      ws["!cols"] = [
        { wch: 6 }, { wch: 14 }, { wch: 50 },
        { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 },
        { wch: 9 }, { wch: 17 }, { wch: 60 },
      ];
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "포토제닉 게시물");
      const d = new Date();
      const stamp = `${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, "0")}${String(d.getDate()).padStart(2, "0")}`;
      XLSX.writeFile(wb, `클린업데이_포토제닉_${stamp}.xlsx`);
    });

    $("refreshBtn").addEventListener("click", load);
    $("lightbox").addEventListener("click", () => { $("lightbox").hidden = true; $("lightboxImg").src = ""; });
    load();
  </script>
</body>
</html>
